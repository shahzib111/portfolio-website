    <h1 class="page-header-text">Get In Touch</h1>

    <div class="contact-wrapper">

      <!-- Contact Info Card -->
      <div class="glass-card mb-4">
        <div class="row g-3">
          <div class="col-sm-6">
            <div class="contact-info-row">
              <i class="fas fa-envelope"></i>
              <a href="mailto:shahzib111@drivensoftwaresolutions.com">shahzib111@drivensoftwaresolutions.com</a>
            </div>
          </div>
          <div class="col-sm-6">
            <div class="contact-info-row">
              <i class="fas fa-phone"></i>
              <span>(404) 996-9713</span>
            </div>
          </div>
          <div class="col-sm-6">
            <div class="contact-info-row">
              <i class="fas fa-map-marker-alt"></i>
              <span>Atlanta, GA</span>
            </div>
          </div>
          <div class="col-sm-6">
            <div class="contact-info-row">
              <i class="fab fa-linkedin-in"></i>
              <a href="https://www.linkedin.com/in/shahzibsarfraz/" target="_blank">linkedin.com/in/shahzibsarfraz</a>
            </div>
          </div>
        </div>
      </div>

      <!-- Contact Form -->
      <div class="glass-card">
        <div id="sendmsg">
          <div class="mb-3">
            <label class="form-label" for="name">Your Name</label>
            <input type="text" class="form-control" id="name" name="name" placeholder="John Doe">
          </div>

          <div class="mb-3">
            <label class="form-label" for="subject">Subject</label>
            <input type="text" class="form-control" id="subject" name="subject" placeholder="What's this about?">
          </div>

          <div class="mb-4">
            <label class="form-label" for="body">Message</label>
            <textarea class="form-control" id="body" name="body" rows="6" placeholder="Your message..."></textarea>
          </div>

          <div class="d-flex align-items-center gap-3 flex-wrap">
            <a id="send-email" href="mailto:shahzib111@gmail.com" class="btn-send">
              <i class="fas fa-paper-plane me-2"></i>Send Message
            </a>
            <span style="color:var(--text-muted); font-size:0.8rem;" id="txt"></span>
          </div>
        </div>
      </div>

      <!-- Signature -->
      <div class="glass-card mt-3 p-2 text-center">
        <img src="img/contact-signature.jpeg" alt="Shahzib Sarfraz Signature" style="max-width:100%; border-radius:8px;">
      </div>
